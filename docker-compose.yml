services:
  mongodb:
    image: mongo:latest
    container_name: hoardr-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
#    environment:
#      MONGO_INITDB_ROOT_USERNAME: root #TODO: Enable auth and use a strong password
#      MONGO_INITDB_ROOT_PASSWORD: root
#      MONGO_INITDB_DATABASE: cardcollectiondb
    volumes:
      - cardcollectiondb-data:/data/db

  mongo-express:
    image: mongo-express:latest #TODO: Use fixed version instead of "latest"
    container_name: hoardr-mongo-ui
    depends_on:
      - mongodb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
#      ME_CONFIG_MONGODB_ADMINUSERNAME: root #TODO: Enable auth and use a strong password
#      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_BASICAUTH_PASSWORD: root
      ME_CONFIG_BASICAUTH_ENABLED: false
      ME_CONFIG_BASICAUTH_USERNAME: admin

volumes:
  cardcollectiondb-data:

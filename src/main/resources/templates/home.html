<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-orange-800 text-orange-100 body-font py-4">
    <div class="container mx-auto px-5 text-center">
        <h1 class="text-4xl font-bold">Series</h1>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow">
    <section class="body-font">
        <div class="container px-5 py-24 mx-auto">
            <div class="flex flex-wrap justify-center -m-4">

                <!-- Series Card -->
                <div th:each="series : ${seriesList}" class="lg:w-1/3 sm:w-1/2 w-full p-3">
                    <div class="relative group cursor-pointer mx-auto bg-gray-800 rounded-lg border-2 border-gray-700 overflow-hidden"
                         th:onclick="|window.location='@{/series/{id}(id=${series.id})}'|">

                        <!-- Image container -->
                        <div class="flex items-center justify-center p-6 h-48 w-full bg-gray-200">
                            <img alt="Series Icon"
                                 class="max-h-full max-w-full object-contain"
                                 th:src="${series.icon} != null ? ${series.icon} : @{https://dummyimage.com/200x200/111/fff&text=${series.name}}">
                        </div>

                        <!-- Hover overlay -->
                        <div class="absolute inset-0 px-6 py-6 bg-gray-900 bg-opacity-90 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-center items-center text-center">
                            <h1 class="title-font text-2xl font-bold text-white mb-2" th:text="${series.name}">Series Name</h1>
                            <p class="leading-relaxed text-gray-300 text-sm">Click to view expansion sets</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<!-- Footer -->
<footer class="bg-orange-800 text-orange-200 text-center text-sm py-4">
    &copy; 2025 DevYouriD. All rights reserved.
</footer>

</body>
</html>

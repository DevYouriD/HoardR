<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${series.name}">Series</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" th:href="@{/snorlax_favicon.ico}" type="image/x-icon">
</head>

<body class="bg-white text-gray-900 min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-orange-800 text-orange-100 body-font py-4">
    <div class="container mx-auto px-5 flex items-center justify-between">
        <!-- Left spacer -->
        <div class="w-6"></div>

        <!-- Centered title -->
        <h1 class="flex-1 text-center truncate sm:truncate-none">
            <a href="/"
               class="font-bold text-2xl sm:text-2xl md:text-3xl lg:text-4xl leading-tight sm:leading-snug md:leading-normal text-center flex-1 truncate sm:truncate-none"
               th:text="${series.name}">
                Series Name
            </a>
        </h1>

        <!-- Pencil icon aligned to right -->
        <a href="/admin" class="text-3xl hover:text-gray-200">
            ✎️
        </a>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow">
    <section class="body-font">
        <div class="container px-5 py-24 mx-auto">
            <div class="flex flex-wrap justify-center -m-4">

                <!-- Expansion Set Card -->
                <div th:each="set : ${expansionSets}"
                     class="lg:w-1/3 sm:w-1/2 w-full p-3">

                    <div class="relative group cursor-pointer mx-auto bg-gray-800 rounded-lg border-2 border-gray-700 overflow-hidden"
                         th:onclick="|window.location='@{/series/{sid}/sets/{eid}(sid=${series.id}, eid=${set.id})}'|">

                        <!-- Image container -->
                        <div class="flex items-center justify-center p-6 h-48 w-full bg-gray-200">
                            <img alt="Expansion Set Icon"
                                 class="max-h-full max-w-full object-contain"
                                 th:src="${set.icon} != null
                     ? ${set.icon}
                     : @{https://dummyimage.com/200x200/111/fff&text=${set.name}}">
                        </div>

                        <!-- Hover overlay -->
                        <div class="absolute inset-0 px-6 py-6 bg-gray-900 bg-opacity-90 opacity-0
                    group-hover:opacity-100 transition-opacity duration-300
                    flex flex-col justify-center items-center text-center">
                            <h1 class="title-font text-xl font-bold text-white mb-2"
                                th:text="${set.name}">
                                Expansion Set
                            </h1>
                            <p class="text-gray-300 text-sm">
                                Cards: <span th:text="${#lists.size(set.cards)}">0</span>
                            </p>
                        </div>

                    </div>
                </div>

                <!-- Empty state -->
                <div th:if="${#lists.isEmpty(expansionSets)}"
                     class="text-center text-gray-500 w-full">
                    No expansion sets yet.
                </div>

            </div>
        </div>
    </section>
</main>

<!-- Footer -->
<footer class="bg-orange-800 text-orange-200 text-center text-sm py-4">
    &copy; <span id="year"></span> DevYouriD. All rights reserved.
</footer>

<script>
    document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>

<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${set.name}">Expansion Set</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-900 min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-orange-800 text-orange-100 py-4">
    <div class="container mx-auto px-5 text-center">
        <h1 class="text-3xl font-bold" th:text="${set.name}">Expansion Set</h1>
        <p class="text-sm opacity-80">
            <span th:text="${series.name}">Series</span>
        </p>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow">
    <section class="body-font">
        <div class="container px-5 py-16 mx-auto">
            <div class="flex flex-wrap justify-center -m-3">

                <!-- Card -->
                <div th:each="card : ${cards}"
                     class="lg:w-1/5 md:w-1/4 sm:w-1/2 w-full p-3">

                    <div class="relative bg-gray-100 border-2 border-gray-300 rounded-lg overflow-hidden">

                        <!-- Collected Checkbox -->
                        <input
                                type="checkbox"
                                th:checked="${card.collected}"
                                disabled
                                class="absolute top-2 right-2 w-5 h-5
                                    accent-green-600 cursor-default"
                                    aria-label="Collected"
                        />

                        <!-- Card face -->
                        <div class="flex items-center justify-center h-56 p-4 bg-white">
                            <img th:if="${card.face != null}"
                                 th:src="${card.face}"
                                 class="max-h-full max-w-full object-contain"
                                 alt="Card"/>

                            <img th:if="${card.face == null}"
                                 th:src="@{https://dummyimage.com/200x280/ddd/111(text=${'#' + card.number})}"
                                 class="max-h-full max-w-full object-contain"
                                 alt="Card placeholder"/>
                        </div>

                        <!-- Card info -->
                        <div class="p-3 text-center">
                            <h2 class="font-semibold text-gray-900 truncate"
                                th:text="${card.name}">Card Name</h2>

                            <p class="text-sm text-gray-500">
                                #<span th:text="${card.number}">1</span>
                            </p>

                            <p th:if="${card.price != null}"
                               class="text-xs text-gray-600 mt-1">
                                €<span th:text="${card.price}">0.00</span>
                            </p>
                        </div>

                    </div>
                </div>

                <!-- Empty state -->
                <div th:if="${#lists.isEmpty(cards)}"
                     class="text-center text-gray-500 w-full">
                    No cards in this expansion set yet.
                </div>

            </div>
        </div>
    </section>
</main>

<!-- Footer -->
<footer class="bg-orange-800 text-orange-200 text-center text-sm py-4">
    &copy; 2025 DevYouriD. All rights reserved.
</footer>

</body>
</html>
